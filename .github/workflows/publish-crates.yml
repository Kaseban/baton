name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

jobs:
  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | python3 -c "import json,sys; print(json.load(sys.stdin)['packages'][0]['version'])")
          if curl -s -A "baton-mcp-release" "https://crates.io/api/v1/crates/baton-mcp/versions" | python3 -c "import json,sys; vs=[v['num'] for v in json.load(sys.stdin)['versions']]; sys.exit(0 if '$version' in vs else 1)"; then
            echo "baton-mcp $version already on crates.io, skipping publish"
          else
            cargo publish
          fi
