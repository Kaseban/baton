# TEMPORARY: debug npm trusted publishing OIDC exchange. Delete after use.
name: oidc-debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    steps:
      - name: Decode OIDC claims and try npm exchange
        run: |
          IDTOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm%3Aregistry.npmjs.org" | jq -r .value)
          PAYLOAD=$(echo "$IDTOKEN" | cut -d. -f2 | tr '_-' '/+')
          PAD=$(( (4 - ${#PAYLOAD} % 4) % 4 )); PAYLOAD="$PAYLOAD$(printf '=%.0s' $(seq 1 $PAD 2>/dev/null))"
          echo "$PAYLOAD" | base64 -d 2>/dev/null | jq '{workflow, workflow_ref, job_workflow_ref, repository, repository_owner, ref, event_name, sub, aud}'
          echo "--- exchange response ---"
          curl -s -w "\nHTTP %{http_code}\n" -X POST \
            https://registry.npmjs.org/-/npm/v1/oidc/token/exchange \
            -H "content-type: application/json" \
            -d "{\"token\":\"$IDTOKEN\"}"
